# SPDX-License-Identifier: Apache-2.0

description: WebOS RGB LED strip exported through devfs

compatible: "webos,rgbled"

include: base.yaml

properties:
  led:
    type: phandle
    required: true
    description: Zephyr LED strip device backing this devfs node.

  webos-pin:
    type: int
    required: true
    description: Logical GPIO pin number used in the /dev/rgbled/<n>/color path.
